# Brazil — Biblioteca da Presidência da República (ex-presidents' speech archive),
# Luiz Inácio Lula da Silva (1st + 2nd mandates, 2003–2010), via the Internet Archive.
#
# WHY WAYBACK + PDF: this Plone archive is the ONLY source for the Lula I–II era
# (2003–2010) — bra_planalto_old_wayback only reaches 2011+. The live origin is behind
# F5/BIG-IP TSPD bot-defense AND appears geo/IP-fenced (connection resets from outside
# Brazil; broken TLS chain), so it can't be scraped live from here. The Internet Archive
# holds the tree, so we enumerate it via the CDX. The speeches are stored as PDF files
# (`content_type: pdf`), not HTML — the engine downloads the archived PDF bytes and
# extracts their text.
#
# HOW THE URLs LOOK (Plone File objects):
#   .../discursos/1o-mandato/2003/18-06-2003-discurso-...-mercosul.pdf        (the object)
#   .../<same>.pdf/@@download/file/<Filename>.pdf                             (raw download)
#   .../<same>.pdf/view                                                       (HTML viewer)
# The date is a DD-MM-YYYY prefix on the object segment (year also in the /YYYY/ folder).
#
# We keep only real PDF captures via the CDX `wayback_filter` (mimetype:application/pdf +
# statuscode:200), which drops the text/html listing/redirect/`/view` noise a prefix query
# returns. The `link_pattern` then keeps the bare object variant (a dated segment ending
# the path) and drops its `/@@download/...` twin, so each speech is scraped once.

source_id: bra_biblioteca_wayback
country: Brazil
source_language: Portuguese
content_type: pdf

start_urls:
  # CDX prefix (no scheme, no trailing '*') — the engine prefix-matches.
  - biblioteca.presidencia.gov.br/presidencia/ex-presidentes/luiz-inacio-lula-da-silva/discursos

listing:
  # keep the bare PDF object (a single segment ending the path, right after the /YYYY/
  # folder); excludes the /@@download/file/… twin (extra path segments) and any /view HTML
  # page — so each speech is scraped once. Most segments carry a DD-MM-YYYY prefix; a few
  # undated ones are kept too.
  link_pattern: '/\d{4}/[^/]+$'

pagination:
  type: wayback
  wayback_filter:
    - "mimetype:application/pdf"
    - "statuscode:200"
  wayback_collapse: urlkey
  wayback_delay: 5.0

# No DOM in a PDF: text comes from the PDF body, the date from the URL (DD-MM-YYYY,
# assembled unambiguously from named groups), and the title falls back to the PDF's first
# line. title/text carry empty selectors — required keys, but unused for PDFs.
title: {}
text: {}
date:
  url_regex: '/(?P<year>\d{4})/(?P<day>\d{2})-(?P<month>\d{2})-'

speaker_default: Lula da Silva
position: president
date_languages: ["pt"]

notes: >
  PDF-over-Wayback. Lula I–II (2003–2010), the only source for that era. Live origin is
  F5/TSPD + geo-fenced (see bra_biblioteca.csv). Companion archives for later Brazilian
  presidents live under the same ex-presidentes/<name>/discursos tree (Dilma, Temer,
  Bolsonaro) and can be added as sibling recipes with a different start_url + speaker.
  Some undated bare objects (no DD-MM prefix, a small minority) are skipped by the
  link_pattern; loosen it if the full run wants them. FULL RUN is the researcher's gate.
