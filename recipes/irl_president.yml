# Ireland — president.ie speeches.
# Drupal-style site: the listing is server-rendered, but the speech page fields
# live in broad wrappers, so we use a selector chain with Drupal fallbacks.
source_id: irl_president
country: Ireland
source_language: English
start_urls:
  - https://president.ie/en/media-library/speeches
renderer: static

listing:
  link_selector: "article a, .views-row a, .view-content a"
  link_pattern: '/en/media-library/speeches/'

pagination:
  type: query_param
  param: page
  start: 1
  step: 1
  max_pages: 400

title:
  selectors: ["main h1", "h1", "title"]
text:
  selectors:
    - ".field--name-body .field__item"
    - ".field--name-body"
    - ".node__content"
    - "article"
date:
  selectors: ["time", ".field--name-field-date", ".date", ".field--name-created"]

position: president
date_languages: ["en"]
notes: >
  president.ie is server-rendered (no JS renderer needed). The body lives in a
  broad Drupal wrapper, so the selector chain needs to tolerate field-wrapper
  drift while keeping the text extraction specific to the speech content.
