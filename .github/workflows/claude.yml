# Lets a coding agent work issues/PRs in this repo: mention "@claude" in an issue
# or a pull-request comment and this workflow runs Claude Code on it.
#
# SETUP (one time): add a repository secret named ANTHROPIC_API_KEY
#   Settings -> Secrets and variables -> Actions -> New repository secret.
# You may need to pin a different action version; see
#   https://github.com/anthropics/claude-code-action
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Run only when summoned AND the person summoning is the repo owner / a member /
    # a collaborator. This matters once the repo is public: it stops a stranger's
    # "@claude" comment from spending your Anthropic credits.
    if: >
      (contains(github.event.comment.body, '@claude') ||
       contains(github.event.issue.body, '@claude')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'MEMBER' ||
       github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
