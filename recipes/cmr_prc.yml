source_id: cmr_prc
country: Cameroon
source_language: English
start_urls:
  - https://www.prc.cm/en/news/speeches-of-the-president
renderer: static

listing:
  link_selector: "a[href*='/news/speeches-of-the-president/']"
  link_pattern: '/news/speeches-of-the-president/\d+-'

pagination:
  type: query_param
  param: start
  start: 0
  step: 10
  max_pages: 500

title:
  selectors: ["h2 a", ".itemTitle", "h1", "title"]
text:
  selectors: [".itemFullText", "article p", "article", "main"]
date:
  selectors: ["time[datetime]"]
  attr: datetime

position: president
speaker_default: Paul Biya
date_languages: ["fr"]
notes: >
  English speeches archive for the Presidency of the Republic of Cameroon. The
  site appears to be a Joomla-style archive with speech URLs under
  /news/speeches-of-the-president/<id>-slug and offset pagination of 10 items.
