# United States — Ronald Reagan (40th president, 1981-1989), via the American Presidency
# Project (presidency.ucsb.edu). Same shape as usa_clinton_app (see its header). person2=200296,
# category2[]=8 ("Spoken Addresses and Remarks"). THIRD-PARTY academic source -> researcher
# decides inclusion. This is the "even further back" example — any earlier president (Carter,
# Ford, ... back to Washington) is the same recipe with a different person2.
source_id: usa_reagan_app
country: United States
source_language: English
dataset: AmericanPresidencyProject
start_urls:
  - "https://www.presidency.ucsb.edu/advanced-search?person2=200296&category2%5B%5D=8&items_per_page=25"
renderer: static

listing:
  link_selector: "td.views-field-title a"
  link_pattern: '/documents/'

pagination:
  type: query_param
  param: page
  start: 0
  step: 1
  max_pages: 250

title:
  selectors: [".field-ds-doc-title h1", ".field-ds-doc-title", "h1"]
text:
  selectors: [".field-docs-content"]
date:
  selectors: [".field-docs-start-date-time span", ".field-docs-start-date-time"]
speaker:
  selectors: ["h3.diet-title a", ".diet-title a"]

position: president
speaker_default: Ronald Reagan
date_languages: ["en"]
politeness:
  delay_range: [1.0, 2.0]
notes: >
  American Presidency Project — Ronald Reagan "Spoken Addresses and Remarks" (person2=200296,
  category2[]=8). Clean Drupal doc pages (see usa_clinton_app). THIRD-PARTY academic source ->
  dataset=AmericanPresidencyProject; researcher decides inclusion + citation. Span ~1981-1989.
  Demonstrates the pattern reaches arbitrarily far back — any president is a person2 swap.
