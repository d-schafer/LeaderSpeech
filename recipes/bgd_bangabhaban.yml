# Bangladesh — Bangabhaban (Office of the President), live speech archive.
source_id: bgd_bangabhaban
country: Bangladesh
source_language: Bengali
start_urls:
  - https://bangabhaban.gov.bd/pages/pm-speeches?page=1
renderer: static

listing:
  # Keep the legacy handlers in scope because Bangabhaban search results have
  # surfaced both /pages/pm-speeches detail slugs and older speech detail URLs.
  link_selector: "a[href*='/pages/pm-speeches/'], a[href*='/site/speech_view/'], a[href*='SpeechDetails.php?ID=']"
  link_pattern: '/(?:pages/(?:pm-)?speeches/[^/?#]+|site/speech_view/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|SpeechDetails\.php\?ID=[^&#]+)$'

pagination:
  type: query_param
  param: page
  start: 1
  step: 1
  max_pages: 60

title:
  selectors:
    - ".page-title"
    - "h1.page-header"
    - ".field-name-title .field-item"
    - "h1"
    - "title"
text:
  selectors:
    - ".field-name-body .field-item"
    - ".article-details"
    - ".webpage-content"
    - ".field-item.even"
    - ".node .content"
    - "article"
    - "main"
date:
  selectors:
    - ".field-name-field-date .field-item"
    - ".date-display-single"
    - "span[property='dc:date dc:created']"
    - "time"
    - ".published"
    - ".submitted"
    - ".page-details"
    - ".details"
    - ".date"
  regex: '[0-9০-৯]{1,2}[/-][0-9০-৯]{1,2}[/-][0-9০-৯]{4}|[0-9০-৯]{4}[/-][0-9০-৯]{1,2}[/-][0-9০-৯]{1,2}|[0-9০-৯]{1,2}\s+[A-Za-z\u0980-\u09FF]+\s+[0-9০-৯]{4}'

position: president
date_languages: ["bn"]
notes: >
  Live Bangabhaban speech listing recipe using the current /pages/pm-speeches
  archive and page=N pagination. Keep Wayback as a separate fallback recipe only
  if older coverage or a dead live host later requires it. This sandbox could
  not resolve bangabhaban.gov.bd, so live probe/run validation still needs a
  network-capable environment.
