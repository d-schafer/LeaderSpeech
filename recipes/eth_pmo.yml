# Ethiopia — Office of the Prime Minister (pmo.gov.et), "Speeches". Abiy Ahmed.
# Ethiopia's PM is the head of government, so this is the high-value Ethiopian source
# (the presidency, eth_thepresidency, is ceremonial AND its domain is dead — see that
# source's outbox row).
#
# The speeches are PDFs: /speeches/ lists each item as "<date> | <title> | Download here"
# pointing at /media/documents/<name>.pdf. There is no speech HTML.
#
# ⚠️ KNOWN, ACCEPTED LIMITATION: THESE ROWS LAND WITH A BLANK DATE. See `date` below.
# This is the single reason the source is `partial` rather than `draft`.
source_id: eth_pmo
country: Ethiopia
source_language: Amharic
start_urls:
  - https://pmo.gov.et/speeches/
renderer: static
content_type: pdf

listing:
  link_pattern: '/media/documents/.*\.pdf'

pagination:
  # `none` IS CORRECT. Verified: /speeches/?page=2, ?paged=2 and #1 all return the
  # byte-identical page (len=60787, the same 30 PDFs); /speeches/page/2/ is a 404 shell.
  # All 30 speeches are on the one page.
  type: none

title: {}
# ^ intentionally EMPTY. No DOM and no date/title in the filename, so the engine falls back
# to the PDF's first line — and here that is exactly right: the first line of each PDF is
# the speech title, matching the listing verbatim. Verified:
#   Erecha.pdf            -> "ኢሬቻ የሰላምና የዕርቅ በዓል ነው!"
#   AU_Summit_2023_2.pdf  -> "Statement at the 36th Ordinary Session of the Assembly of the Union"
#   ADSW_Keynote_Speech_.pdf -> "Pioneering the Possible: Ethiopia's Green transition solution…"
# Do NOT add a url_regex title here: the filenames are opaque slugs ("Erecha",
# "ADSW_Keynote_Speech_", "IGF_2022_Remarks_3") and would be strictly worse.
text: {}   # the PDF body; extracts cleanly in both Amharic and English (1.9k-10.8k chars)
date: {}
# ^ intentionally EMPTY, and this is the source's real weakness — read before "fixing" it.
#
# The date EXISTS but only on the LISTING ("Oct. 6, 2023 | <title> | Download here"), and
# the engine cannot carry listing metadata onto a PDF row (api/feed sources can carry
# per-item metadata; an HTML listing cannot). So every row here gets a blank date.
#
# ⚠️ DO NOT try to recover it from the FILENAME. Some filenames end in what looks like a
# year and IS NOT a Gregorian one — it is the ETHIOPIAN calendar (~7-8 years behind):
#   "እንኳን_ለኢየሱስ_ክርስቶስ_የልደት_በአል_አደረሳችሁ_2015.pdf"  is listed as  Jan. 27, 2023
# A `url_regex: (?P<year>\d{4})` would confidently stamp that speech 2015 — eight years
# wrong, and wrong in a way that looks perfectly plausible in the output.
# ⚠️ DO NOT use a PDF-body date regex either: these open with the title and salutations,
# and the first date-looking string in the body is whatever the speech happens to mention.
# A blank date is honest; the cleaning stage's corrected-date pass can fill it.

position: prime minister
# Safe here: the whole published range (2018-2023) is Abiy Ahmed, PM since April 2018.
speaker_default: Abiy Ahmed
# Listing dates are GREGORIAN ("May 14, 2018" … "Oct. 6, 2023") — noted for whoever wires
# the listing date in later; it is only the filenames that use the Ethiopian calendar.
date_languages: ["am", "en"]
notes: >
  PARTIAL — full text, NO DATES. Probe-validated: 30 speech PDFs on a single page (no pager;
  ?page=/?paged= are ignored and re-serve page 1). Bodies extract cleanly in Amharic and
  English. Titles come from the PDF's own first line and match the listing exactly. The date
  is the problem: it lives ONLY on the listing, which the engine cannot carry onto a PDF row,
  so all 30 rows land undated (see the `date` comment for why filename/body dates are traps —
  the filenames use the ETHIOPIAN calendar, 2015 = 2023). Coverage 2018-05 .. 2023-10 by the
  listing's dates, i.e. it spans Abiy's term but with only 30 items and nothing published
  since Oct 2023 — a sample, not an archive. Mixed Amharic/English; source_language: Amharic
  is the dominant case and the cleaner's language detection should settle each row.
  FOLLOW-UP (engine): "listing carries date+title, body is a PDF" now blocks two sources in
  this batch (eth_pmo fully, gmb_op for 17 of 58 undated files). Carrying HTML-listing
  metadata onto the row the way `api`/`feed` entries already do would fix both — worth an
  issue. Sibling trees worth a source each: /statements/, /press_release/, /articles/.
