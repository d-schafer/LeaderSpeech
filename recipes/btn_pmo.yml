# Bhutan — Prime Minister's Office speeches archive (pmo.gov.bt).
# Expected WordPress category archive with /page/{n} pagination.
source_id: btn_pmo
country: Bhutan
source_language: English
start_urls:
  - https://www.pmo.gov.bt/category/speeches
renderer: static

listing:
  link_selector: "h2.entry-title a, h3.entry-title a, article h2 a, article h3 a"
  link_pattern: '^https?://(www\.)?pmo\.gov\.bt/(?:\?p=\d+|[0-9]{4}/[0-9]{2}/[0-9]{2}/[a-z0-9-]+/?|[a-z0-9-]+/?)$'

pagination:
  type: path
  path_format: "page/{n}"
  start: 1
  step: 1
  max_pages: 200

title:
  selectors: ["h1.entry-title", "article h1", "h1", "title"]
text:
  selectors: [".entry-content", ".post-content", "article"]
date:
  selectors: ["time.entry-date", "time.published", "time", ".posted-on", ".entry-meta"]

position: prime minister
date_languages: ["en"]
notes: >
  Repointed from royalkidu.bt to the official Prime Minister's Office domain.
  Validate with probe in a network-enabled runner and tighten link/selectors if the
  live listing structure differs.
