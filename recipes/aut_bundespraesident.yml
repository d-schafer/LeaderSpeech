# Austria — Bundespräsident (bundespraesident.at), Alexander Van der Bellen.
# TYPO3 + tx_news. /aktuelles is the presidency's full news/speech archive:
# 131 pages x 10 items = ~1,298 items, back to 2017-01-26 (Van der Bellen's
# inauguration) — i.e. his complete term.
#
# WHY the pager pages are enumerated in start_urls (pagination: none) rather than
# paginated — all the normal strategies were tested and each is impossible here:
#   * query_param: the pager is
#     /aktuelles/page?tx_news_pi1[currentPage]=N&cHash=<hash>. TYPO3 validates the
#     cHash — an HMAC over the params using the site's secret encryptionKey — so the
#     page URL cannot be synthesised by incrementing N. Every cHash-free form was
#     tried (/aktuelles?…currentPage=2, /aktuelles/page/2, /aktuelles/seite-2, and the
#     [@widget_0] form): each either returns a 404 page or silently re-serves page 1.
#   * click: the "next" control IS a real <a href> carrying a valid cHash, but under
#     renderer: js the site's timeline script sets the paginator to display:none (it
#     swaps in infinite scroll). Playwright refuses to click a non-visible element
#     ("element is not visible"), so the engine's click branch breaks after page 1.
#     The infinite scroll re-requests those same cHash'd URLs, so it is no way around.
#   * sitemap: there is none — /sitemap.xml and the TYPO3 ?type=1533906435 route both
#     fail, and /robots.txt is itself a 404 page.
#   * url_list: harvest_links returns a url_list verbatim as the *speech* URLs; it does
#     not fetch them and extract links, so it cannot express "these are listing pages".
#   So the pager URLs (each carrying its stable cHash) are listed as start_urls, and
#   pagination: none makes the engine fetch EACH of them and extract the speech links.
#   This is plain static fetching — fast, no JS.
#
# REGENERATING the list (do this if a full run's coverage stops short of 2017-01-26):
#   walk /aktuelles over plain HTTP following `li.next a[data-nextlink]`, collecting
#   each page URL. New items land on page 1 and push older ones down, so the page count
#   grows slowly; a stale list loses only the OLDEST items, never the newest.
source_id: aut_bundespraesident
country: Austria
source_language: German
renderer: static

# Page 1 + the 130 cHash-pinned pager pages behind it (regenerate as described above).
start_urls:
