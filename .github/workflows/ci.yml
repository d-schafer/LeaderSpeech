name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # [pdf] is here so the content_type: pdf tests actually run — without it they
      # importorskip past, and the PDF extraction path goes untested.
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,pdf]
      # Playwright browsers are NOT installed here — tests must not launch a browser.
      - name: Run tests (includes validating every recipe against the schema)
        run: pytest -q
