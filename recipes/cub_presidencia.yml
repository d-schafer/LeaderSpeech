# Cuba — Presidencia y Gobierno de la Republica de Cuba (presidencia.gob.cu).
# Speeches under /es/presidencia/intervenciones/{slug}/. Static, server-rendered HTML.
# There is NO article sitemap (sitemap.xml is a 35-URL nav map) and no working page
# pager on the main listing (?page= / /page/N both ignored, return the same recent
# items). The full Diaz-Canel-era archive (2018-04 .. present) is reachable only via the
# year/MONTH archive pages (/intervenciones/{YEAR}/{MONTH}/), all 79 of which are listed
# in the main listing's archive widget. Each month page lists that month's speeches, so
# we enumerate the 79 month pages as start_urls with pagination.type: none — the engine
# then harvests each month's speech links via listing.link_pattern.
# Spanish; president is Miguel Diaz-Canel.
source_id: cub_presidencia
country: Cuba
source_language: Spanish
renderer: static
