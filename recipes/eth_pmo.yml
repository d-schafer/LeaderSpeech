# Ethiopia — Office of the Prime Minister (pmo.gov.et), "Speeches". Abiy Ahmed.
# Ethiopia's PM is the head of government, so this is the high-value Ethiopian source
# (the presidency, eth_thepresidency, is ceremonial AND its domain is dead — see that
# source's outbox row).
#
# The speeches are PDFs: /speeches/ lists each item as "<date> | <title> | Download here"
# pointing at /media/documents/<name>.pdf. There is no speech HTML — but the DATE is on the
# listing, and the engine now carries it onto the row via listing.item_date (issue #55).
source_id: eth_pmo
country: Ethiopia
source_language: Amharic
start_urls:
  - https://pmo.gov.et/speeches/
renderer: static
content_type: pdf

listing:
  link_pattern: '/media/documents/.*\.pdf'
  # The date lives on the LISTING, not in the URL. Each speech is one
  # `div.row.content-display`; the link's nearest such ancestor is its item. VERIFIED
  # 2026-07: 30 blocks / 30 PDF links, and the date sits in a SIBLING column (col-md-4) of
  # the link's (col-md-8), so ONLY naming the row reaches it — no walk up from the <a> does.
  item_selector: 'div.row.content-display'
  item_date: { selectors: ['div.meta-data p'] }   # "Oct. 6, 2023"; parsed with date_languages
  # item_title deliberately UNSET: the PDF's own first line is already the title verbatim
  # (see `title`), and since the page always wins it would be config that never fires.

pagination:
  # `none` IS CORRECT. Verified: /speeches/?page=2, ?paged=2 and #1 all return the
  # byte-identical page (len=60787, the same 30 PDFs); /speeches/page/2/ is a 404 shell.
  # All 30 speeches are on the one page.
  type: none

title: {}
# ^ intentionally EMPTY. No DOM and no date/title in the filename, so the engine falls back
# to the PDF's first line — and here that is exactly right: the first line of each PDF is
# the speech title, matching the listing verbatim. Verified:
#   Erecha.pdf            -> "ኢሬቻ የሰላምና የዕርቅ በዓል ነው!"
#   AU_Summit_2023_2.pdf  -> "Statement at the 36th Ordinary Session of the Assembly of the Union"
#   ADSW_Keynote_Speech_.pdf -> "Pioneering the Possible: Ethiopia's Green transition solution…"
# Do NOT add a url_regex title here: the filenames are opaque slugs ("Erecha",
# "ADSW_Keynote_Speech_", "IGF_2022_Remarks_3") and would be strictly worse.
text: {}   # the PDF body; extracts cleanly in both Amharic and English (1.9k-10.8k chars)
date: {}
# ^ intentionally EMPTY: the date is not on the page (a PDF) or in the URL, so there is no
# selector or url_regex to give here. It comes from listing.item_date above. The two traps
# that empty `date` used to guard against are still traps — do not "fix" it by adding either:
#
# ⚠️ DO NOT recover the date from the FILENAME. Some filenames end in what looks like a
# year and IS NOT a Gregorian one — it is the ETHIOPIAN calendar (~7-8 years behind):
#   "እንኳን_ለኢየሱስ_ክርስቶስ_የልደት_በአል_አደረሳችሁ_2015.pdf"  is listed as  Jan. 27, 2023
# A `url_regex: (?P<year>\d{4})` would confidently stamp that speech 2015 — eight years
# wrong, and wrong in a way that looks perfectly plausible in the output.
# ⚠️ DO NOT use a PDF-body date regex either: these open with the title and salutations,
# and the first date-looking string in the body is whatever the speech happens to mention.
# The listing date is the one trustworthy source, and it is GREGORIAN.

position: prime minister
# Safe here: the whole published range (2018-2023) is Abiy Ahmed, PM since April 2018.
speaker_default: Abiy Ahmed
# Listing dates are GREGORIAN ("May 14, 2018" … "Oct. 6, 2023"); only the filenames use the
# Ethiopian calendar, and those are never read for the date (see `date`).
date_languages: ["am", "en"]
notes: >
  DRAFT — full text AND dates. Probe-validated: 30 speech PDFs on a single page (no pager;
  ?page=/?paged= are ignored and re-serve page 1). Bodies extract cleanly in Amharic and
  English. Titles come from the PDF's own first line and match the listing exactly. Dates
  come from the HTML listing via listing.item_date (issue #55): all 30 rows date, spanning
  2018-05-14 .. 2023-10-06. The filenames are NOT used for the date — some carry an
  ETHIOPIAN-calendar year (2015 = 2023), which is why the `date` field stays empty and only
  the listing date is trusted. Coverage spans Abiy's term but with only 30 items and nothing
  published since Oct 2023 — a sample, not an archive. Mixed Amharic/English;
  source_language: Amharic is the dominant case and the cleaner's language detection should
  settle each row. Sibling trees worth a source each: /statements/, /press_release/,
  /articles/.
