# Philippines — Official Gazette speeches archive used as the scraper-friendly
# alternative after pco.gov.ph returned 403 to both bot and browser UAs.
source_id: phl_pco
country: Philippines
source_language: English
start_urls:
  - https://www.officialgazette.gov.ph/section/speeches/
  - https://www.officialgazette.gov.ph/section/historical-papers-documents/speeches/
renderer: static

listing:
  link_selector: "article .entry-title a, h2.entry-title a, h1.entry-title a"
  link_pattern: '^https?://www\.officialgazette\.gov\.ph/\d{4}/\d{2}/\d{2}/[^/]+/?$'

pagination:
  type: path
  path_format: "page/{n}/"
  start: 2
  step: 1
  max_pages: 300

title:
  selectors: ["h1.entry-title", "h1", "title"]
text:
  selectors: [".entry-content p", ".entry-content", "article", "main"]
date:
  selectors: ["time.entry-date", ".entry-date", "time"]
  regex: '[A-Z][a-z]+ \d{1,2}, \d{4}'

position: president
date_languages: ["en"]
notes: >
  The live PCO speech archive returned hard 403/WAF responses even to a browser
  UA, so this recipe targets the Official Gazette's WordPress speech archives
  instead. The list pages appear to use standard /page/N/ pagination and dated
  speech permalinks, with entry-title / entry-date / entry-content selectors.
