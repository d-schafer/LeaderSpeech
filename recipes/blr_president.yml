# Belarus — president.gov.by (official portal of the President).
# Events/addresses URLs use /<lang>/events/<slug>-<id>; sitemap crawl avoids guessing pager behavior.
source_id: blr_president
country: Belarus
source_language: Russian
start_urls:
  - https://president.gov.by/ru/events/addresses
renderer: static

listing:
  link_pattern: '/ru/events/[a-z0-9\-]+-\d{10}(?:\?.*)?$'

pagination:
  type: sitemap
  sitemap_urls:
    - https://president.gov.by/sitemap.xml

title:
  selectors: ["h1", ".detail__title", ".news-detail__title", "title"]
text:
  selectors: [".detail__content", ".detail__text", "article", "main"]
date:
  selectors: ["time[datetime]", ".detail__date", ".news-detail__date", "time"]
  attr: datetime

position: president
speaker_default: Alexander Lukashenko
date_languages: ["ru"]
notes: >
  Primary URL pattern observed for speech/event pages is /ru/events/<slug>-<10-digit-id>.
  Uses sitemap traversal for full-history coverage and link_pattern to keep only event detail pages.
