name: "New source recipe"
description: "Add a scraper recipe for one leader-speech source (a website)."
title: "[recipe] <country> — <source name>"
labels: ["recipe", "good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        One issue = one source = one recipe in `recipes/`. Fill in what you can by inspecting the site;
        see [`docs/recipes.md`](../blob/main/docs/recipes.md) for how. Blanks are fine — a partial
        recipe that scrapes title/text/date is already useful.

        **Working this end to end (incl. agents):** follow
        [`docs/agent_task_end_to_end.md`](../blob/main/docs/agent_task_end_to_end.md) — write the recipe,
        prove it with `python -m leaderspeech.text_scraper.probe --recipe recipes/<id>.yml`, do a capped
        run, scrape the full history, debug via [`docs/debugging.md`](../blob/main/docs/debugging.md), then
        set the source's `recipe_status` to `validated` and open a PR. The "Definition of done" checklist is
        in that runbook.
  - type: input
    id: country
    attributes:
      label: Country
      description: As it appears in pycountry (e.g. "United States", "Côte d'Ivoire").
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Listing / index URL
      description: The page that links to individual speeches.
    validations:
      required: true
  - type: dropdown
    id: renderer
    attributes:
      label: Needs JavaScript?
      description: View source (not the rendered DOM). If the speech list is missing from raw HTML, choose "js".
      options:
        - "static (plain HTML)"
        - "js (JavaScript-rendered)"
        - "not sure"
    validations:
      required: true
  - type: dropdown
    id: pagination
    attributes:
      label: Pagination style
      options:
        - "query_param (?start= / ?page=)"
        - "path (/discursos/2)"
        - "click (next button, JS)"
        - "url_list (handful of fixed pages)"
        - "none (single page)"
        - "not sure"
    validations:
      required: true
  - type: textarea
    id: selectors
    attributes:
      label: Selector notes
      description: CSS selectors you found for the link list, title, body text, date, and speaker.
      placeholder: |
        link_selector: a.panel ; link_pattern: /discursos/\d+
        title: h1.titulo
        text: div.body
        date: span.fecha (Spanish)
        speaker: span.orador
  - type: input
    id: language
    attributes:
      label: Speech language
      description: For date parsing and the originlanguage columns (e.g. Spanish, French, English).
  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: Date range, which leaders are covered, quirks, whether it is single-office, dead-site/Wayback, etc.
