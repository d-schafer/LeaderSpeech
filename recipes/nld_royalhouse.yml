listing:
  link_selector: ".sui-results-container a, .search-block__results a"
  link_pattern: '/documents/\d{4}/\d{2}/\d{2}/'

title:
  selectors: ["h1"]
text:
  selectors: ["main article", "main"]
date:
  url_regex: '/documents/(?P<year>\d{4})/(?P<month>\d{2})/(?P<day>\d{2})/'

position: king
date_languages: ["en", "nl"]
notes: >
  DRAFT - probe-validated (no full run). Netherlands Royal House via royal-house.nl
  /documents?type=speech. Platform-Rijksoverheid Search-UI SPA -> renderer: js; the cursor pager
  is not chainable, so the ~60 cursor pages (?current=n_<page>_n) are enumerated as start_urls
  (type: none), covering ~2004->present (King Willem-Alexander 2013-, plus Queen Maxima and pre-2013
  Beatrix/Crown-Prince). Detail pages static; text from <main>; date from the document URL.
  speaker_default omitted (mixed royals) - cleaner assigns speaker + keeps the head of state; the
  document-type gate drops the few non-speech royal reports the type facet leaks. Speeches are in
  their delivery language (mostly English, some German/French/Dutch on state visits). FULL RUN
  pending (js render of ~60 listing pages + detail pages).
