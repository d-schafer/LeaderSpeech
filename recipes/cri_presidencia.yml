# Costa Rica — Presidencia de la República communications.
# Current site publishes updates under /noticias/ with slug permalinks.
source_id: cri_presidencia
country: Costa Rica
source_language: Spanish
start_urls:
  - https://www.presidencia.go.cr/noticias/
renderer: static

listing:
  link_selector: "article a, .entry-title a, h2 a, h3 a, .post-title a"
  link_pattern: '/(noticias|comunicados)/(?:\d{4}/\d{2}/)?[a-z0-9][a-z0-9-]+/?$'

pagination:
  type: path
  path_format: "page/{n}"
  start: 1
  step: 1
  max_pages: 400

title:
  selectors: ["h1.entry-title", "h1.post-title", ".entry-header h1", "h1", "title"]
text:
  selectors: [".entry-content", "article .entry-content", ".post-content", "article", "main", ".content"]
date:
  selectors: ["time.entry-date", "time.published", "time[datetime]", ".entry-date", ".post-date", "time", ".posted-on time"]
  attr: datetime
context:
  selectors: [".cat-links", ".entry-meta .cat-links", ".entry-categories", ".tags-links", ".breadcrumb", ".entry-meta"]

position: president
date_languages: ["es"]
notes: >
  Costa Rica's presidency site now routes news/communications under /noticias/
  with /noticias/page/{n}/ pagination and slug detail URLs. Link filter keeps
  /noticias/ and legacy /comunicados/ detail pages.
  Speaker is intentionally omitted and filled downstream from leader tenure.
