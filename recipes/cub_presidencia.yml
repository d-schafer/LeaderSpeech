listing:
  link_selector: "a[href*='/intervenciones/']"
  # speech slug pages: /intervenciones/<slug>/ ; exclude category/author and the
  # year & year/month archive index pages (which are the start_url listing pages).
  link_pattern: '/es/presidencia/intervenciones/(?!category/|author/|\d{4}/)[a-z0-9][a-z0-9-]{10,}/?$'

pagination:
  type: none

title:
  selectors: ["h1", "title"]
text:
  selectors: [".blog-posts", ".margin-b-20", "article", "main"]
date:
  selectors: ["time"]
  attr: datetime

position: president
speaker_default: Miguel Diaz-Canel
date_languages: ["es"]
notes: >
  presidencia.gob.cu intervenciones. Static HTML; no article sitemap and no working
  page pager, so full history (2018-04 .. present, Diaz-Canel era) is enumerated via the
  79 year/MONTH archive pages as start_urls with pagination.type: none — the engine
  fetches each month page and harvests that month's speech links. Speech slug pages
  under /intervenciones/<slug>/; link_pattern excludes category/author and the year &
  year/month index pages. Title h1, body .blog-posts, date time[datetime].
  speaker_default Miguel Diaz-Canel (note: some intervenciones are by PM Manuel Marrero
  or others — an /author/ taxonomy exists; the cleaner's speaker confirmation corrects
  non-Diaz-Canel authors downstream). Refresh start_urls with any new month pages when
  re-running. gob.cu can be slow/intermittent from outside Cuba; raise politeness if so.
