# Israel — Prime Minister's Office (the head of GOVERNMENT / national leader),
# on the gov.il government portal, ENGLISH section. NOT the ceremonial president.
#
# gov.il is a React SPA behind Cloudflare. The PMO English news/speeches collector
# page (/en/collectors/news?OfficeId=<PMO GUID>) is rendered with renderer: js
# (Playwright clears the Cloudflare JS challenge), which populates the /en/pages/
# links; it paginates via a ?skip=N offset query param. Each /en/pages/<slug> speech
# page is then fetched (also js) and the body/date read off the rendered page.
#
# Why NOT pagination.type: api: gov.il exposes a clean JSON collector API
# (openapi-gc.digital.gov.il/.../GetResults, filtered by OfficeId, paged by skip),
# but its result rows give the speech URL only as a RELATIVE path (/en/pages/<slug>)
# with no absolute-host field, and the engine urljoins that against start_urls[0] —
# which for an api recipe is the API host (openapi-gc...), producing wrong URLs. The
# API row's date also sits at tags.metaData."Publish Date"[0].title, a list-index +
# spaced key the engine's dotted-path _dig can't reach. Both are engine limits, not
# recipe-fixable, so we harvest links from the rendered human collector page instead
# (correct www.gov.il host) and read title/body/date off the js-rendered speech page.
source_id: isr_pmo
country: Israel
source_language: English
# gov.il's Cloudflare needs a real browser UA for the js challenge.
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
renderer: js
start_urls:
  # PMO-filtered EN news collector. OfficeId e744bba9-... = "Prime Minister's Office"
  # (from the site's GetOfficesList); ~10,267 EN items. limit=20 sets the page size.
  - "https://www.gov.il/en/collectors/news?OfficeId=e744bba9-d17e-429f-abc3-50f7a8a55667&limit=20"

listing:
  link_selector: "a[href*='/en/pages/']"
  link_pattern: "/en/pages/"

pagination:
  type: query_param
  param: skip          # offset (skip=0,20,40,…), added alongside the fixed limit=20
  start: 0
  step: 20
  max_pages: 600       # ~10,267 items / 20 ≈ 514 pages; 600 is a safe cap

title:
  selectors: ["h1", "title"]
text:
  selectors: [".html-section", "main .html-section", "article", "main"]
date:
  # Head metadata is a list of key/value pairs all sharing the (hashed) value class;
  # the engine joins all matches then regexes out the first DD.MM.YYYY = the Publish
  # Date. Match the class on its stable prefix (the __hash suffix can change).
  selectors: ["[class*='headMetaData_md_val']"]
  regex: '\d{1,2}\.\d{1,2}\.\d{4}'

position: prime minister
# Dates are DD.MM.YYYY (Israeli order). date_languages: ["he"] forces day-first
# parsing (["en"] mis-reads 05.07.2026 as May 7 instead of 5 July). Text is English.
date_languages: ["he"]

# gov.il's Cloudflare HARD-BLOCKS bursts: back-to-back headless fetches get
# "Sorry, you have been blocked" after the first page. ~15s/request clears reliably
# (validated: 3/3 pages OK at 15s spacing, 1/3 at 6s). This makes a full ~10k-item
# run LONG (~40+ hours) — it is a deliberate FULL-RUN pacing cost, not a defect.
politeness:
  delay_range: [12, 18]
  retries: 4
  backoff: 20

notes: >
  Israel PMO (head of government, the national leader — NOT the ceremonial
  president). gov.il EN section, renderer: js. Listing = the rendered PMO news
  collector (OfficeId GUID e744bba9-d17e-429f-abc3-50f7a8a55667, ~10,267 EN items),
  paged by ?skip=N. Speech pages: title h1, body .html-section, date the first
  DD.MM.YYYY in [class*='headMetaData_md_val'] (Publish Date), parsed day-first via
  date_languages ["he"]. Validated end-to-end with the engine's extract_record
  (title/12k-char body/date 2026-07-05 all correct). Speaker deliberately LEFT BLANK:
  the archive spans multiple PMs (Netanyahu / Bennett / Lapid) — the tenure crosscheck
  assigns speaker from country+date. CAVEATS for the researcher (FULL RUN gate): (1)
  gov.il's Cloudflare hard-blocks bursts, so heavy pacing (~15s/req) is required and a
  full run takes ~40+ hours — pace-test a --limit slice first; if the WAF still throttles,
  raise politeness further. (2) The clean JSON collector API exists but the engine can't
  use it here (relative URLs join to the wrong host; date behind a list-index/spaced key)
  — an engine enhancement (api url base override + list-index dotted paths) would make a
  much faster api recipe possible and is worth a future ticket. (3) A separate Hebrew
  section exists with likely even deeper history if English coverage proves shallow.
