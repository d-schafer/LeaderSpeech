# Netherlands - the Royal House (royal-house.nl), reigning head of state (King Willem-Alexander;
# the archive also holds Queen Maxima and pre-2013 Queen Beatrix / Crown-Prince speeches).
# Same Platform-Rijksoverheid "Search-UI" SPA as rijksoverheid.nl: the /documents listing renders
# client-side (renderer: js) and its detail pages are static HTML with full text in <main>; every
# document URL carries its date (/documents/YYYY/MM/DD/slug -> url_regex).
#
# WHY a synthesised start_urls list instead of a pager: the SPA's only pager is a cursor
# ("Next page" -> ?current=n_2_n) that the engine cannot chain reliably (click is blocked by the
# cookie overlay; next_link chains only ~1 hop). BUT the cursor token is just the page number:
# ?type=speech&current=n_<page>_n renders page <page> directly (verified: n_1=2026 ... n_55=2004,
# n_65 empty). So we enumerate the pages as start_urls (type: none) and let the engine render +
# harvest each. ~60 pages x 10 -> ~600 documents back to ~2004.
#
# speaker_default is intentionally omitted: the type=speech set mixes King Willem-Alexander, Queen
# Maxima and (pre-2013) Queen Beatrix, so the cleaner's speaker pass + tenure crosscheck assign the
# speaker from the title and keep the reigning head of state. A few non-speech royal reports leak
# through the imperfect type facet and are dropped by the cleaner's document-type gate.
source_id: nld_royalhouse
country: Netherlands
source_language: English
renderer: js
start_urls:
  - https://www.royal-house.nl/documents?type=speech&current=n_1_n
