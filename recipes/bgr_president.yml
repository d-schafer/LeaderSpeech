# Bulgaria — Presidency (president.bg), historical news/speeches via the sitemap.
#
# WHY SITEMAP (not the live listing): the live /news/ index paginates as
# /news/page/N/ but the site sets <base href="https://www.president.bg/"> and its
# article links are RELATIVE (./newsNNNN/<slug>.html). The sitemap's <loc> entries are
# ABSOLUTE, so they sidestep that. Coverage: the sitemap is stale (last built 2016) =>
# ~2012-2016 (Plevneliev era), ~4,379 clean /newsNNNN/ permalinks.
#
# UPDATE 2026-07 (issue #56): the engine now HONOURS <base href>, so the live /news/page/N/
# listing is scrapable and would recover the 2017-2026 Radev-era gap the stale sitemap
# misses. This recipe still uses the sitemap (it works and is complete for 2012-2016);
# moving it to the live listing is tracked as a follow-up. A bgr_president_wayback.yml over
# the IA CDX is the other route to the Radev gap.
source_id: bgr_president
country: Bulgaria
source_language: Bulgarian
start_urls:
  - https://www.president.bg/sitemap.xml
renderer: static

listing:
  # Keep sitemap URLs to article permalinks (/newsNNNN/<slug>.html); drops section
  # and category pages. Tolerates the './news' artifact some <loc>s carry.
  link_pattern: '/news\d+/[^/]+\.html$'

pagination:
  type: sitemap
  sitemap_urls:
    - https://www.president.bg/sitemap.xml   # index -> sitemap_000.xml + sitemap_001.xml

title:
  selectors: ["h2.article-title", "h1", "title"]
text:
  selectors: [".print-content", ".font-resize-content"]
date:
  selectors: [".date"]

position: president
date_languages: ["bg"]
notes: >
  Presidency of Bulgaria. Sitemap recipe over president.bg/sitemap.xml — probe-
  verified clean extraction across 2012-2016 (title h2.article-title, text
  .print-content, date .date; ~4,379 permalinks). Content is BULGARIAN (Cyrillic)
  even on /en/ URLs, so source_language: Bulgarian and date_languages: [bg]
  (dates read like "21 Юни 2026"). Captures presidential + vice-presidential
  activity/statements; the cleaner's tenure gate narrows to leader speeches.
  Speaker filled downstream from leader tenure. FOLLOW-UP: the engine now honours
  <base href> (issue #56), so the live /news/page/N/ listing is scrapable and would
  cover the 2017-2026 Radev gap; a bgr_president_wayback.yml over the IA CDX is the
  other route to it. This recipe stays on the sitemap for the complete 2012-2016 set.
