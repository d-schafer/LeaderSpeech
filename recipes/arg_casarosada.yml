# Argentina — Casa Rosada, official presidential speeches.
# Wayback archive of the speeches section; this reaches back through the Kirchner era.
source_id: arg_casarosada
country: Argentina
source_language: Spanish
start_urls:
  - casarosada.gob.ar/informacion/discursos/*
renderer: static

listing:
  link_selector: "a[href*='/informacion/discursos/']"
  link_pattern: '/informacion/discursos/\d'

pagination:
  type: wayback
  wayback_limit: 2000

title:
  selectors: [".col-md-8.col-md-offset-2 h2", "h1", "title"]
text:
  selectors: [".col-md-8.col-md-offset-2 p", ".col-md-8.col-md-offset-2", "article", "main"]
date:
  selectors: ["time", ".col-md-8 time", ".fecha", ".date"]

position: president
date_languages: ["es"]
notes: >
  speaker left blank on purpose — Casa Rosada has no speaker element; the leader
  (Milei / Fernández / Macri / Kirchner / ...) is filled later from the title +
  leader-tenure key.
