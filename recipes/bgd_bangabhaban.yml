# Bangladesh — Bangabhaban (Office of the President).
#
# ⚠️ BLOCKED — NOT RUNNABLE TO USEFUL OUTPUT WITH THE CURRENT ENGINE. DO NOT full-run.
# Reviewer probed the live site (2026-07-07). The listing works and detail links
# harvest fine, but the engine cannot produce valid text+date rows here:
#   1. Each speech BODY is a PDF attachment (Oracle object storage,
#      objectstorage.ap-dcc-gazipur-1.oraclecloud*.com). The HTML detail page holds
#      only a feedback form — NO speech text — so `text` comes back empty and the
#      row is dropped. (The title is an <h2>, not <h1>.)
#   2. The DATE ("১০-০৬-২০২৬", Bengali DD-MM-YYYY) appears only on the LISTING rows,
#      not the detail pages, and the standard HTML listing→detail flow does not carry
#      listing metadata into detail extraction.
# Wayback has the SAME structure, so it is not a fix. Unblocking needs engine
# features (out of scope for a recipe): (a) fetch+extract linked PDFs (pdf-to-text),
# and (b) carry listing-row date/metadata into detail extraction like the
# api/feed/wayback flows already do. Otherwise, find a Bangladesh source with inline
# HTML speech text (e.g. the PMO / Cabinet Division press wing).
#
# The selectors below are corrected to the REAL site (verify_ssl:false for the broken
# cert chain; working listing selector; h2 title; listing-date regex) so this recipe
# is ~90% ready the moment PDF + listing-metadata support lands. It still cannot pass
# a run until then.
source_id: bgd_bangabhaban
country: Bangladesh
source_language: Bengali
start_urls:
  - https://bangabhaban.gov.bd/pages/pm-speeches
renderer: static
verify_ssl: false          # broken TLS cert chain (CERTIFICATE_VERIFY_FAILED)

listing:
  link_selector: "a[href*='/pages/pm-speeches/']"
  link_pattern: '/pages/pm-speeches/[^/?#]+$'

pagination:
  type: query_param
  param: page
  start: 1
  step: 1
  max_pages: 60

title:
  selectors: ["h2", ".page-title", "h1", "title"]   # article title is the page <h2>
text:
  # NONE of these yield speech text — the body is a PDF. Left as a best-effort chain
  # for when PDF extraction exists; today this returns only the feedback-form chrome.
  selectors: [".body", ".container", "article", "main"]
date:
  # The date is NOT on the detail page (it is on the listing rows). No detail-page
  # selector can find it today; needs listing-metadata carry-through.
  selectors: ["time", ".date", ".submitted"]
  regex: '[০-৯]{1,2}[/-][০-৯]{1,2}[/-][০-৯]{4}'

position: president
date_languages: ["bn"]
notes: >
  BLOCKED (see header): speeches are PDF attachments and the date lives only on the
  listing, so the HTML text-scraper cannot produce valid text+date rows. Not a
  wayback-fixable case. Needs engine support for PDF text extraction + listing-row
  metadata carry-through, or a different Bangladesh source with inline HTML text.
