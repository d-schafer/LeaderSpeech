# Austria — Bundespräsident (bundespraesident.at), Alexander Van der Bellen.
# TYPO3 + tx_news. /aktuelles is the presidency's full news/speech archive:
# ~131 pages x 10 items = ~1,298 items, back to 2017-01-26 (Van der Bellen's
# inauguration) — i.e. his complete term.
#
# WHY pagination: next_link — this page URL cannot be *synthesised*, only followed:
#   * query_param is impossible: the pager is
#     /aktuelles/page?tx_news_pi1[currentPage]=N&cHash=<hash>, and TYPO3 validates the
#     cHash (an HMAC over the params using the site's secret encryptionKey). Requesting
#     the param without a valid cHash returns a 404. Every cHash-free form was tried
#     (/aktuelles?…currentPage=2, /aktuelles/page/2, /aktuelles/seite-2, the [@widget_0]
#     form): each either 404s or silently re-serves page 1.
#   * click is impossible: the "next" control IS a real <a href> carrying a valid cHash,
#     but under renderer: js the site's timeline script sets the paginator to
#     display:none (it swaps in infinite scroll), and Playwright refuses to click a
#     non-visible element — the engine's click branch then breaks after page 1.
#   * sitemap: there is none (/sitemap.xml and the TYPO3 ?type=1533906435 route both
#     fail; /robots.txt is itself a 404 page).
#   Over plain HTTP the pager works perfectly — every "next" is a server-rendered
#   <a href> carrying a valid cHash — which is exactly what next_link follows.
source_id: aut_bundespraesident
country: Austria
source_language: German
start_urls:
  - https://www.bundespraesident.at/aktuelles
renderer: static

listing:
  link_selector: "a[href*='/aktuelles/detail/']"
  link_pattern: '/aktuelles/detail/[^/]+$'

pagination:
  # <ul class="f3-widget-paginator"> … <li class="next"><a data-nextlink href="…&cHash=…">
  type: next_link
  next_selector: "li.next a[data-nextlink]"
  max_pages: 300   # archive is ~131 pages; the chain self-terminates well before this

title:
  # The page opens with an <h1>Suche</h1> (the search box), so anchor the title inside
  # the news article wrapper rather than using a bare h1.
  selectors: [".news-single h1", ".news-single-content h1", "h1"]
text:
  # .news-single-content is the body; .article/.news-single also swallow the
  # "Das könnte Sie auch interessieren" related-news block, so they only trail.
  selectors: [".news-single-content", ".news-single", ".article", "main#main-content"]
date:
  selectors: ["time"]
  attr: datetime

position: president
date_languages: ["de"]
notes: >
  Issue #19. Coverage 2017-01-26 .. present (~1,298 items) = Van der Bellen's full
  term. speaker_default is deliberately omitted: /aktuelles is the presidency's news
  feed and also carries items centred on other Hofburg figures (e.g. Doris
  Schmidauer), so the downstream tenure crosscheck / GPT speaker pass assigns the
  speaker from country+date instead of the recipe hard-coding one. Text stays in
  German; the translation stage fills the English text/title columns.
