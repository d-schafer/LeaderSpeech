# South Africa — Presidency (thepresidency.gov.za), OLD site, via the Internet Archive.
# The current thepresidency.gov.za was rebuilt for the 7th administration (2024- ) and its live
# speeches listing is a JS/AJAX Drupal view; current presidential speeches are also on gov.za
# (see zaf_gov), so this recipe targets the PREVIOUS presidency site's deep speech archive.
# CDX for thepresidency.gov.za/speeches = 3638 distinct /speeches/<slug> article captures (of 42k+
# total captures), the old Drupal-7 site: Zuma (to 2018), Ramaphosa as Deputy President then
# President (2014-2024). Archived article: title h1, body .field-name-body (Drupal 7 single-dash),
# date a date-class element ("19 March 2015"). English.
source_id: zaf_thepresidency_wayback
country: South Africa
source_language: English
renderer: static
start_urls:
  - thepresidency.gov.za/speeches

listing:
  # A real Drupal pathauto slug is lowercase alphanumerics + hyphens only (e.g.
  # /speeches/address-deputy-president-cyril-ramaphosa-...). Match EXACTLY that (issue #64):
  #   * excludes the ?page=N referrer variants (no '?' can appear in [a-z0-9-]);
  #   * excludes the hundreds of MALFORMED captures the Archive holds under /speeches/ —
  #     percent-encoded mirror junk like /speeches/%22http:/en.wikipedia.org/.../system.base.css
  #     and /speeches/%22mailto:...%22 — which are NOT speeches: they fetch a ~659-char
  #     nav-chrome page (no .field-name-body), so the generic fallback wrote a thin snippet
  #     and the cleaner rejected ~every row. The old '[^?]{12,}$' admitted all of them
  #     (138 junk vs 22 real in a 160-capture sample); this keeps only real article slugs.
  # {11,} => a ≥12-char slug (real speech slugs are long descriptive strings).
  link_pattern: 'thepresidency\.gov\.za/speeches/[a-z0-9][a-z0-9-]{11,}$'

pagination:
  type: wayback
  wayback_delay: 5.0
  wayback_filter:
    - "statuscode:200"

title:
  selectors: ["h1#page-title", "h1", "title"]
text:
  selectors: [".field-name-body", ".field--name-body", ".node__content"]
date:
  selectors: [".date-display-single", "[class*=date-display]", "[class*=date]", "time"]
  regex: '\d{1,2}\s+[A-Z][a-z]+\s+\d{4}'

position: president
date_languages: ["en"]
notes: >
  DRAFT — probe-validated (no full run). Old thepresidency.gov.za Drupal-7 speech archive
  (Zuma / Ramaphosa 2014-2024) via the Internet Archive. Title h1, body .field-name-body,
  date from a date-class element (regex "D Month YYYY"). No speaker_default (Zuma, Ramaphosa,
  deputy presidents) -> tenure crosscheck. Complements zaf_gov (current + broad aggregator).
  English.
  FIX (issue #64): the earlier "~659 chars/speech, ~0% keep" was NOT a text-selector bug —
  .field-name-body extracts the full body (3k–17k chars, correct dates) on real speech pages.
  The cause was the over-permissive link_pattern '[^?]{12,}$', which admitted hundreds of
  MALFORMED captures the Archive stores under /speeches/ (percent-encoded mirror junk like
  /speeches/%22http:/en.wikipedia.org/.../system.base.css). Those fetch a 659-char nav page
  and the cleaner rejected them. link_pattern now matches only real lowercase-hyphen Drupal
  slugs, so the harvest is real articles only.
